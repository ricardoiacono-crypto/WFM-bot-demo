<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Chat Launcher</title>
    <style>
        body {
            font-family: Inter, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .chat-button {
            background-color: #04888a;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background-color 0.3s, transform 0.1s;
        }
        .chat-button:hover {
            background-color: #036568;
            transform: translateY(-2px);
        }
        .chat-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <button onclick="openChat()" class="chat-button">
        Open Chat
    </button>

    <script>
        function openChat() {
            // Dynamic sizing: 30% of screen width, 80% of screen height
            const width = Math.floor(screen.width * 0.30);
            const height = Math.floor(screen.height * 0.80);

            // Center the popup on screen
            const left = (screen.width - width) / 2;
            const top = (screen.height - height) / 2;

            // Open chromeless popup - no toolbars, no navigation, just chat
            window.open(
                `WFM-030326-v4-chat.html?width=${width}&height=${height}`,
                'WFM Chat',
                `width=${width},height=${height},left=${left},top=${top},toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes`
            );
        }
    </script>
</body>
</html>
